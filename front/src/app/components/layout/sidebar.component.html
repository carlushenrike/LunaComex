<nav class="w-64 bg-slate-900 h-full flex flex-col shrink-0 hidden md:flex text-slate-300">
  <div class="p-6 border-b border-slate-700">
    <h1 class="text-xl font-bold text-white flex items-center gap-2">
       <app-icon name="layers" class="text-blue-500"></app-icon>
       Luna Comex
    </h1>
    <p class="text-xs text-slate-500 mt-1 pl-7">Módulo Importação</p>
  </div>
  
  <div class="flex-1 overflow-y-auto py-6 space-y-1">
    @for (item of app.menuItems; track item.id) {
      <button 
        (click)="app.setPage(item.id)"
        class="w-full flex items-center gap-3 px-6 py-3 transition-colors relative text-left hover:text-white hover:bg-slate-800"
        [class.bg-slate-800]="app.currentPage() === item.id"
        [class.text-white]="app.currentPage() === item.id"
        [class.border-l-4]="app.currentPage() === item.id"
        [class.border-blue-500]="app.currentPage() === item.id"
        [class.border-transparent]="app.currentPage() !== item.id"
      >
        <app-icon [name]="item.icon" [size]="20"></app-icon>
        <span class="text-sm font-medium">{{ item.label }}</span>
      </button>
    }
  </div>

  <div class="p-4 border-t border-slate-700 bg-slate-900">
    <div class="flex items-center gap-3 px-2">
       <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-xs">
         JS
       </div>
       <div class="overflow-hidden">
         <p class="text-sm font-medium text-white truncate">João Silva</p>
         <p class="text-xs text-slate-500 truncate">Despachante</p>
       </div>
    </div>
  </div>
</nav>
