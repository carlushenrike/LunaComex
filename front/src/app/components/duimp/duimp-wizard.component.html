<div class="flex flex-col h-full bg-slate-50">
  <app-header></app-header>

  <div class="bg-white border-b border-slate-200 px-8 py-0">
    <div class="flex items-center justify-between">
       @for (step of store.steps; track step.id; let i = $index) {
         <button 
           (click)="store.setStep(step.id)"
           class="flex items-center gap-2 py-4 border-b-2 transition-all relative group flex-1 justify-center"
           [class.border-blue-600]="store.currentStep() === step.id"
           [class.border-transparent]="store.currentStep() !== step.id"
           [class.text-blue-600]="store.currentStep() === step.id"
           [class.text-slate-500]="store.currentStep() !== step.id"
         >
           <div 
             class="flex items-center justify-center w-6 h-6 rounded-full text-xs font-bold transition-colors"
             [class.bg-blue-600]="store.currentStep() === step.id"
             [class.text-white]="store.currentStep() === step.id"
             [class.bg-slate-200]="store.currentStep() !== step.id"
             [class.bg-emerald-500]="store.currentStep() > step.id"
             [class.text-white]="store.currentStep() > step.id"
           >
             @if (store.currentStep() > step.id) {
                <app-icon name="check" [size]="12"></app-icon>
             } @else {
                {{ step.id }}
             }
           </div>
           <span class="text-sm font-medium whitespace-nowrap">{{ step.label }}</span>
         </button>
       }
    </div>
  </div>

  <main class="flex-1 overflow-y-auto p-4 md:p-8">
    <div class="max-w-5xl mx-auto pb-20">
      @switch (store.currentStep()) {
        @case (1) { <app-step-cover /> }
        @case (2) { <app-step-cargo /> }
        @case (3) { <app-step-documents /> }
        @case (4) { <app-step-items /> }
        @case (5) { <app-step-payments /> }
      }

      <div class="mt-8 pt-6 border-t border-slate-200 flex justify-between">
        <button 
          (click)="store.prevStep()"
          [disabled]="store.currentStep() === 1"
          class="px-6 py-2 rounded-md font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed text-slate-600 hover:bg-slate-100"
        >
          Voltar
        </button>
        
        <button 
          (click)="store.nextStep()"
          [disabled]="store.currentStep() === 5"
          [class]="'flex items-center gap-2 px-6 py-2 rounded-md font-medium transition-colors shadow-sm ' + 
            (store.currentStep() === 5 ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700')"
        >
          @if (store.currentStep() === 5) {
             Revisar
          } @else {
             Próximo Passo
             <app-icon name="chevron-right" [size]="16"></app-icon>
          }
        </button>
      </div>
    </div>
  </main>
</div>
